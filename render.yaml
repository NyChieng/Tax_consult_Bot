services:
  - type: web
    name: mycukai-api
    runtime: docker
    plan: starter
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mycukai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mycukai-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_SECRET_KEY
        generateValue: true
    healthCheckPath: /health

databases:
  - name: mycukai-db
    plan: starter
    databaseName: mycukai_db
    user: mycukai
